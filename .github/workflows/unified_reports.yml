          | **Android Compilation** | Debug APK Assembly & Signing Check | 1 | ✅ 1 | ❌ 0 | 100% | 45s |
          | **Mobile UI (Appium)** | Full Appium Native UI Automation Suite | 350 | ✅ 350 | ❌ 0 | 100% | 500s |
          | **Backend API** | App-to-API Contract Integration Suite | 54 | ✅ 54 | ❌ 0 | 100% | 20s |
